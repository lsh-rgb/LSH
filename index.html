<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRAY NAVI v16.5 - Voice Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #eee; height: 100vh; display: flex; overflow: hidden; }
        
        .main-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; }

        .side-bar { width: 260px; background: #222; border-left: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 12px; background: #333; border-bottom: 1px solid #444; font-size: 13px; font-weight: bold; color: #4da3ff; display: flex; justify-content: space-between; }
        .content { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .control-group { margin-bottom: 10px; background: #2d2d2d; padding: 8px; border-radius: 6px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; font-weight: bold; }
        
        /* 음성 입력 행 최적화 */
        .voice-input-row { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
        input { flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 13px; -webkit-appearance: none; }
        .btn-voice { width: 36px; height: 36px; background: #444; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .btn-voice.active { background: #ff5252; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .btn-calc { width: 100%; padding: 12px; background: #007acc; color: white; border: none; font-weight: bold; border-radius: 4px; font-size: 14px; margin-bottom: 6px; }
        .btn-save { width: 100%; padding: 8px; background: #28a745; color: white; border: none; font-weight: bold; border-radius: 4px; font-size: 11px; }

        #logBox { flex: 1; background: #000; padding: 8px; font-size: 11px; color: #0f0; overflow-y: auto; border-radius: 4px; border: 1px solid #333; margin-top: 5px; }
        .log-item { border-bottom: 1px solid #222; padding: 6px 0; line-height: 1.5; }
    </style>
</head>
<body>

<div class="main-container" id="container">
    <canvas id="trayCanvas"></canvas>
</div>

<div class="side-bar">
    <div class="header">TRAY NAVI <span style="font-size:9px; color:#666;">v16.5🎤</span></div>
    <div class="content">
        <div class="control-group">
            <label>FILE LOAD</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </div>

        <div class="control-group">
            <label>PATH FINDER (VOICE SUPPORT)</label>
            <div class="voice-input-row">
                <input type="text" id="startId" placeholder="출발 랙">
                <button class="btn-voice" onclick="startVoice('startId')">🎤</button>
            </div>
            <div class="voice-input-row">
                <input type="text" id="endId" placeholder="도착 랙">
                <button class="btn-voice" onclick="startVoice('endId')">🎤</button>
            </div>
            <input type="number" id="extraM" value="8" step="0.5" placeholder="여장(m)">
            <button class="btn-calc" onclick="calculate()">계산 실행</button>
            <button class="btn-save" onclick="exportLog()">LOG 엑셀 저장</button>
        </div>

        <div id="logBox">> Voice ready.</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('trayCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');
    const logBox = document.getElementById('logBox');
    
    let mapData = [], colWidths = [], pathArr = [], calculationHistory = []; 
    let scale = 1.0, offX = 20, offY = 20, cellH = 26;

    // --- [음성 인식 엔진] ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if(recognition) {
        recognition.lang = 'ko-KR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    function startVoice(targetId) {
        if(!recognition) return alert("이 브라우저는 음성 인식을 지원하지 않습니다.");
        const btn = event.currentTarget;
        btn.classList.add('active');
        recognition.start();

        recognition.onresult = (event) => {
            let text = event.results[0][0].transcript;
            // 랙 번호 특성상 공백 제거 및 대문자 변환
            text = text.replace(/\s/g, '').toUpperCase();
            document.getElementById(targetId).value = text;
            btn.classList.remove('active');
        };
        recognition.onerror = () => btn.classList.remove('active');
        recognition.ononspeechend = () => recognition.stop();
    }

    // --- [터치 및 드로잉 엔진 (기존 기능 유지)] ---
    let lastTap = 0, isDragging = false, lastDist = 0, lx, ly;
    container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY;
            const now = Date.now();
            if (now - lastTap < 300) handleEdit(e.touches[0]);
            lastTap = now;
        } else if (e.touches.length === 2) {
            isDragging = false;
            lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    });

    container.addEventListener('touchmove', (e) => {
        if (isDragging && e.touches.length === 1) {
            offX += (e.touches[0].clientX - lx); offY += (e.touches[0].clientY - ly);
            lx = e.touches[0].clientX; ly = e.touches[0].clientY; render();
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            scale *= (dist / lastDist); lastDist = dist; render();
        }
    });

    container.addEventListener('touchend', () => isDragging = false);

    function handleEdit(touch) {
        const rect = canvas.getBoundingClientRect();
        const rx = (touch.clientX - rect.left - offX) / scale;
        const ry = (touch.clientY - rect.top - offY) / (cellH * scale);
        const r = Math.floor(ry);
        let c = -1, accX = 0;
        for(let i=0; i<colWidths.length; i++) {
            if(rx >= accX && rx < accX + colWidths[i]) { c = i; break; }
            accX += colWidths[i];
        }
        if(r >= 0 && r < mapData.length && c >= 0 && (mapData[r] && c < colWidths.length)) {
            const cur = String(mapData[r][c] || "").trim();
            if(cur === "") mapData[r][c] = "ㅇ";
            else if(cur === "ㅇ" || cur === "O") {
                const v = prompt("랙 번호:", "");
                mapData[r][c] = (v && v.trim()) ? v.toUpperCase() : "ㅇ";
            } else mapData[r][c] = ""; 
            updateColWidths(); render();
        }
    }

    function isTray(v) {
        if (!v) return false;
        const s = String(v).trim().toUpperCase();
        return s === "ㅇ" || s === "O" || s === "T" || (s.length >= 2 && /[0-9]/.test(s));
    }

    function updateColWidths() {
        if(!mapData.length) return;
        colWidths = [];
        const maxCols = Math.max(...mapData.map(r => r ? r.length : 0));
        for(let c=0; c < maxCols; c++) {
            let maxW = 35;
            for(let r=0; r < mapData.length; r++) {
                const val = String(mapData[r] && mapData[r][c] ? mapData[r][c] : "");
                if(val.length > 2) maxW = Math.max(maxW, val.length * 9 + 12);
            }
            colWidths[c] = maxW;
        }
    }

    function exportLog() {
        if (calculationHistory.length === 0) return alert("저장할 로그가 없습니다.");
        const ws = XLSX.utils.json_to_sheet(calculationHistory);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "TrayLog");
        XLSX.writeFile(wb, "Tray_Calculation_Log.xlsx");
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
            const workbook = XLSX.read(evt.target.result, { type: 'binary' });
            mapData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            updateColWidths(); autoFit();
        };
        reader.readAsBinaryString(file);
    };

    function autoFit() { canvas.width = container.clientWidth; canvas.height = container.clientHeight; render(); }

    function render() {
        ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.translate(offX, offY); ctx.scale(scale, scale);
        mapData.forEach((row, r) => {
            let cx = 0; if(!row) return;
            for(let c=0; c < colWidths.length; c++) {
                const val = row[c], cw = colWidths[c];
                if(isTray(val)) {
                    ctx.fillStyle = String(val).length >= 2 ? "#1a73e8" : "#333";
                    ctx.fillRect(cx, r*cellH, cw-1, cellH-1);
                    if(String(val).length >= 2) {
                        ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
                        ctx.fillText(val, cx + cw/2, r*cellH + 17);
                    }
                } else { ctx.strokeStyle = "#222"; ctx.strokeRect(cx, r*cellH, cw-1, cellH-1); }
                if(pathArr.some(p => p.r === r && p.c === c)) {
                    ctx.fillStyle = "rgba(255, 235, 59, 0.6)"; ctx.fillRect(cx, r*cellH, cw-1, cellH-1);
                }
                cx += cw;
            }
        });
    }

    function calculate() {
        const s = document.getElementById('startId').value.trim().toUpperCase();
        const e = document.getElementById('endId').value.trim().toUpperCase();
        const extra = parseFloat(document.getElementById('extraM').value) || 0;
        let start, end;
        mapData.forEach((row, r) => { if(!row) return; row.forEach((v, c) => {
            if(v && String(v).toUpperCase() === s) start = {r, c};
            if(v && String(v).toUpperCase() === e) end = {r, c};
        });});
        if(!start || !end) return alert("랙 미발견");
        
        let q = [start], visited = new Set(), parent = new Map();
        visited.add(`${start.r},${start.c}`);
        while(q.length) {
            let curr = q.shift();
            if(curr.r === end.r && curr.c === end.c) {
                pathArr = []; let t = curr;
                while(t) { pathArr.push(t); t = parent.get(`${t.r},${t.c}`); }
                render();
                const nodes = pathArr.length;
                const dist = ((nodes - 1) * 0.6 + extra).toFixed(1);
                const logItem = document.createElement('div');
                logItem.className = 'log-item';
                logItem.innerHTML = `<b>${s}➔${e}</b><br><span style="color:#ffeb3b">${nodes}칸</span> | <b>${dist}m</b>`;
                logBox.prepend(logItem);
                calculationHistory.push({ "출발": s, "도착": e, "칸수": nodes, "총거리": dist, "시간": new Date().toLocaleTimeString() });
                return;
            }
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr, dc]) => {
                let nr = curr.r + dr, nc = curr.c + dc;
                if(mapData[nr] && isTray(mapData[nr][nc]) && !visited.has(`${nr},${nc}`)) {
                    visited.add(`${nr},${nc}`); parent.set(`${nr},${nc}`, curr); q.push({r:nr, c:nc});
                }
            });
        }
        alert("경로 없음");
    }
    window.onresize = autoFit;
    autoFit();
</script>
</body>
</html>
